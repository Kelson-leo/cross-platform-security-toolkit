name: Cross-Platform Build & Test

on:
      push:
        branches: [ main ]
      pull_request:
        branches: [ main ]

jobs:
      build-and-test:
        strategy:
          fail-fast: false
          matrix:
            os: [ubuntu-latest, windows-latest]

        runs-on: ${{ matrix.os }}

        steps:
        - uses: actions/checkout@v4

        - name: Setup Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.11'

        - name: Install Conan
          run: pip install conan

        - name: Setup Conan Profile
          run: conan profile detect --force

        - name: Install Linux Dependencies
          if: runner.os == 'Linux'
          run: |
            sudo apt-get update
            sudo apt-get install -y build-essential cmake

        - name: Configure and Build
          shell: bash
          run: |
            cd tools/system-monitor
            mkdir -p build && cd build
            conan install .. --build=missing -s build_type=Release --output-folder=.
            cmake .. -DCMAKE_TOOLCHAIN_FILE=./conan_toolchain.cmake -DCMAKE_BUILD_TYPE=Release
            cmake --build . --config Release

        - name: Run System Monitor (Linux)
          if: runner.os == 'Linux'
          run: |
            cd tools/system-monitor/build
            ./system_monitor

        - name: Run System Monitor (Windows)
          if: runner.os == 'Windows'
          shell: bash
          run: |
            cd tools/system-monitor/build/Release
            ./system_monitor.exe
