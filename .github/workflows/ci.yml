name: Cross-Platform Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Conan
      run: pip install conan

    - name: Setup Conan Profile
      run: conan profile detect --force

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libpcap-dev

    # ------------------------------------------------------------
    # 1. BUILD ALL C++ PROJECTS (System Monitor, Sniffer, Hybrid Backend)
    # ------------------------------------------------------------
    - name: Build All C++ Tools (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        build_cmake_project() {
          local PROJ_DIR="$1"
          echo "🛠️ Building C++ tool: ${PROJ_DIR}"
          cd "${PROJ_DIR}"
          mkdir -p build && cd build

          if [ -f ../conanfile.txt ] && [ -s ../conanfile.txt ]; then
            echo "  📦 Running Conan install..."
            conan install .. --build=missing -s build_type=Release -s compiler.cppstd=17 --output-folder=.
            cmake .. -DCMAKE_TOOLCHAIN_FILE=./conan_toolchain.cmake -DCMAKE_BUILD_TYPE=Release
          else
            echo "  ⚡ No Conan dependencies, using CMake directly..."
            cmake .. -DCMAKE_BUILD_TYPE=Release
          fi
          cmake --build . --config Release

          cd "${GITHUB_WORKSPACE}"
        }

        for TOOL in tools/*/; do
          FOUND=0
          # Check root CMakeLists.txt
          if [ -f "${TOOL}CMakeLists.txt" ]; then
            build_cmake_project "${TOOL}"
            FOUND=1
          fi
          # Check immediate subdirectories (e.g. hybrid-detector/cpp_backend/)
          for SUB in "${TOOL}"*/; do
            if [ -f "${SUB}CMakeLists.txt" ]; then
              build_cmake_project "${SUB}"
              FOUND=1
            fi
          done
          if [ $FOUND -eq 0 ]; then
            echo "⚠️ Pulando ${TOOL} (sem CMakeLists.txt)"
          fi
        done

    - name: Build All C++ Tools (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $tools = Get-ChildItem -Directory tools/*
        foreach ($t in $tools) {
          # Search CMakeLists.txt in root + immediate subdirectories (depth 1)
          $cmFiles = @(Get-ChildItem -Path $t.FullName -Filter "CMakeLists.txt" -Depth 1 -File)
          if ($cmFiles.Count -eq 0) {
            Write-Host "⚠️ Skipping $($t.Name) (no CMakeLists.txt)"
            continue
          }
          foreach ($cm in $cmFiles) {
            $projDir = $cm.DirectoryName
            $displayName = if ($projDir -eq $t.FullName) { $t.Name } else { "$($t.Name)/$(Split-Path $projDir -Leaf)" }
            Write-Host "🛠️ Building C++ tool: $displayName"

            Push-Location $projDir
            if (-not (Test-Path build)) { New-Item -ItemType Directory -Path build | Out-Null }
            Push-Location build

            # Always run conan install — even with empty conanfile, it generates
            # a toolchain that loads the MSVC environment on Windows (pwsh doesn't
            # load VS vars automatically, unlike the Conan toolchain which does).
            Write-Host "  📦 Running Conan install..."
            conan install .. --build=missing -s build_type=Release -s compiler.cppstd=17 --output-folder=.
            $toolchain = Join-Path (Get-Location) "conan_toolchain.cmake"
            if (-not (Test-Path $toolchain)) {
              Write-Error "conan_toolchain.cmake not found at $toolchain"
              Get-ChildItem -Force
              Exit 1
            }
            cmake .. -DCMAKE_TOOLCHAIN_FILE="$toolchain" -A x64

            cmake --build . --config Release
            Pop-Location
            Pop-Location
          }
        }

    # ------------------------------------------------------------
    # 2. RUN C++ PROJECTS TESTS (Linux)
    # ------------------------------------------------------------
    - name: Run C++ Tests (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        for TOOL in tools/*/; do
          if [ -f "${TOOL}build/system_monitor" ]; then
            echo "▶️ Executando System Monitor..."
            "${TOOL}build/system_monitor"
          fi
          if [ -f "${TOOL}build/packet_sniffer" ]; then
            echo "▶️ Executando Packet Sniffer..."
            timeout 2s "${TOOL}build/packet_sniffer" || true
          fi
        done

    - name: Run C++ Tests (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $tools = Get-ChildItem -Directory tools/*
        foreach ($t in $tools) {
          $sysmon = Join-Path $t.FullName "build/Release/system_monitor.exe"
          $sniffer = Join-Path $t.FullName "build/Release/packet_sniffer.exe"
          if (Test-Path $sysmon) {
            Write-Host "▶️ Executando System Monitor..."
            & $sysmon
          }
          if (Test-Path $sniffer) {
            Write-Host "▶️ Executando Packet Sniffer..."
            Start-Process -FilePath $sniffer -Wait -NoNewWindow
          }
        }

    # ------------------------------------------------------------
    # 3. 🆕 BUILD C# PROJECTS (Hybrid Detector) - WINDOWS ONLY
    # ------------------------------------------------------------
    - name: Setup .NET SDK
      if: runner.os == 'Windows'
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Build and Run Hybrid Detector (C# + C++ Interop)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Write-Host "🔷 Compilando o frontend C#..."
        Push-Location tools/hybrid-detector/csharp_frontend
        dotnet build -c Release

        Write-Host "🔷 Copiando a DLL C++ para a pasta do C#..."
        $dest = Join-Path $PWD "bin/Release/net8.0"
        $dllSources = @(
          (Join-Path $PWD "..\cpp_backend\build\Release\hybrid_backend.dll"),
          (Join-Path $PWD "..\cpp_backend\build\Debug\hybrid_backend.dll"),
          (Join-Path $PWD "..\cpp_backend\build\hybrid_backend.dll")
        )
        $found = $false
        foreach ($src in $dllSources) {
          if (Test-Path $src) {
            Copy-Item $src -Destination $dest -Force
            Write-Host "✅ DLL copiada: $src -> $dest"
            $found = $true
            break
          }
        }
        if (-not $found) {
          Write-Host "⚠️ hybrid_backend.dll não encontrada — pulando teste de integração."
          Write-Host "Conteúdo de ../cpp_backend/build/:"
          if (Test-Path ..\cpp_backend\build) {
            Get-ChildItem -Recurse -Force ..\cpp_backend\build | ForEach-Object { Write-Host "  $($_.FullName)" }
          } else {
            Write-Host "  ⚠️ Diretório build/ não existe!"
          }
        } else {
          Write-Host "🔷 Executando o Hybrid Detector (teste de integração)..."
          Push-Location $dest
          .\HybridDetector.exe
          Write-Host "✅ Hybrid Detector executado com sucesso!"
          Pop-Location
        }
        Pop-Location

    # ------------------------------------------------------------
    # 3.5 ML-NIDS TESTS + MODEL TRAINING
    # ------------------------------------------------------------
    - name: Run ML-NIDS Tests (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        echo "Running ML-NIDS unit tests..."
        cd tools/ml-nids/build
        ./test_nids
        echo "All ML-NIDS tests passed!"

    - name: Train ML Model (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        echo "Training Random Forest model..."
        cd tools/ml-nids/build
        ./train_model
        echo "Model training pipeline validated!"

    - name: Run ML-NIDS Tests (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Write-Host "Running ML-NIDS unit tests..."
        Push-Location tools/ml-nids/build
        $testExe = Join-Path (Get-Location) "Release\test_nids.exe"
        if (Test-Path $testExe) {
          & $testExe
          Write-Host "All ML-NIDS tests passed!"
        } else {
          Write-Host "WARNING: $testExe not found — skipping tests."
        }
        Pop-Location

    - name: Train ML Model (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Write-Host "Training Random Forest model..."
        Push-Location tools/ml-nids/build
        $trainExe = Join-Path (Get-Location) "Release\train_model.exe"
        if (Test-Path $trainExe) {
          & $trainExe
          Write-Host "Model training pipeline validated!"
        } else {
          Write-Host "WARNING: $trainExe not found — skipping training."
        }
        Pop-Location

    # ------------------------------------------------------------
    # 4. UPLOAD ARTEFACTS
    # ------------------------------------------------------------
    - name: Upload Linux Artifacts
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: linux-binaries
        path: |
          tools/system-monitor/build/system_monitor
          tools/packet-sniffer/build/packet_sniffer
          tools/ml-nids/build/ml_nids

    - name: Upload Windows Artifacts
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: windows-binaries
        path: |
          tools/system-monitor/build/Release/system_monitor.exe
          tools/packet-sniffer/build/Release/packet_sniffer.exe
          tools/ml-nids/build/Release/ml_nids.exe
          tools/hybrid-detector/cpp_backend/build/Release/hybrid_backend.dll
          tools/hybrid-detector/csharp_frontend/bin/Release/net8.0/HybridDetector.exe