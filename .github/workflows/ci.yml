name: Cross-Platform Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Conan
      run: pip install conan

    - name: Setup Conan Profile
      run: conan profile detect --force

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake

    # ------------------------------------------------------------
    # 1. BUILD ALL C++ PROJECTS (System Monitor, Sniffer, Hybrid Backend)
    # ------------------------------------------------------------
    - name: Build All C++ Tools
      shell: bash
      run: |
        for TOOL in tools/*/; do
          if [ -f "${TOOL}CMakeLists.txt" ]; then
            echo "🛠️ Building C++ tool: ${TOOL}"
            cd "${TOOL}"
            mkdir -p build && cd build
            
            # Conan e CMake
            conan install .. --build=missing -s build_type=Release --output-folder=.
            cmake .. -DCMAKE_TOOLCHAIN_FILE=./conan_toolchain.cmake -DCMAKE_BUILD_TYPE=Release
            cmake --build . --config Release
            
            cd ../..
          else
            echo "⚠️ Pulando ${TOOL} (sem CMakeLists.txt)"
          fi
        done

    # ------------------------------------------------------------
    # 2. RUN C++ PROJECTS TESTS (Linux)
    # ------------------------------------------------------------
    - name: Run C++ Tests (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        for TOOL in tools/*/; do
          if [ -f "${TOOL}build/system_monitor" ]; then
            echo "▶️ Executando System Monitor..."
            "${TOOL}build/system_monitor"
          fi
          if [ -f "${TOOL}build/packet_sniffer" ]; then
            echo "▶️ Executando Packet Sniffer..."
            timeout 2s "${TOOL}build/packet_sniffer" || true
          fi
        done

    - name: Run C++ Tests (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        for TOOL in tools/*/; do
          if [ -f "${TOOL}build/Release/system_monitor.exe" ]; then
            echo "▶️ Executando System Monitor..."
            "${TOOL}build/Release/system_monitor.exe"
          fi
          if [ -f "${TOOL}build/Release/packet_sniffer.exe" ]; then
            echo "▶️ Executando Packet Sniffer..."
            powershell -Command "Start-Process -FilePath '${TOOL}build/Release/packet_sniffer.exe' -Wait" || true
          fi
        done

    # ------------------------------------------------------------
    # 3. 🆕 BUILD C# PROJECTS (Hybrid Detector) - WINDOWS ONLY
    # ------------------------------------------------------------
    - name: Setup .NET SDK
      if: runner.os == 'Windows'
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Build and Run Hybrid Detector (C# + C++ Interop)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        echo "🔷 Compilando o frontend C#..."
        cd tools/hybrid-detector/csharp_frontend
        dotnet build -c Release
        
        echo "🔷 Copiando a DLL C++ para a pasta do C#..."
        # A DLL gerada pelo CMake fica em cpp_backend/build/Release/
        cp ../cpp_backend/build/Release/hybrid_backend.dll ./bin/Release/net8.0/ || cp ../cpp_backend/build/hybrid_backend.dll ./bin/Release/net8.0/
        
        echo "🔷 Executando o Hybrid Detector (teste de integração)..."
        cd ./bin/Release/net8.0/
        ./HybridDetector.exe
        echo "✅ Hybrid Detector executado com sucesso!"

    # ------------------------------------------------------------
    # 4. UPLOAD ARTEFACTS
    # ------------------------------------------------------------
    - name: Upload Linux Artifacts
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: linux-binaries
        path: |
          tools/system-monitor/build/system_monitor
          tools/packet-sniffer/build/packet_sniffer
          # (O backend do hybrid não gera executável no Linux, apenas DLL Windows)

    - name: Upload Windows Artifacts
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: windows-binaries
        path: |
          tools/system-monitor/build/Release/system_monitor.exe
          tools/packet-sniffer/build/Release/packet_sniffer.exe
          tools/hybrid-detector/cpp_backend/build/Release/hybrid_backend.dll
          tools/hybrid-detector/csharp_frontend/bin/Release/net8.0/HybridDetector.exe